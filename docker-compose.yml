services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: vibetodo
      POSTGRES_USER: vibetodo
      POSTGRES_PASSWORD: vibetodo
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vibetodo -d vibetodo"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"

  web:
    build:
      context: .
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://vibetodo:vibetodo@db:5432/vibetodo
    ports:
      - "3000:3000"
