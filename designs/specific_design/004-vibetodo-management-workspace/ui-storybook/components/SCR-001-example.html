<div class="mw-storybook-frame">
  <div class="mw-shell">
    <main class="mw-card mw-main">
      <div class="mw-kicker">
        <span class="mw-kicker-state __STATE_CLASS__">__STATE_LABEL__</span>
        <p class="mw-kicker-copy">__STATE_META__</p>
      </div>

      <div class="mw-heading-block">
        <p class="mw-screen-label">Shared screen / __SCREEN_LABEL__</p>
        <h1 class="mw-heading">__PAGE_TITLE__</h1>
        <p class="mw-copy">__PAGE_COPY__</p>
      </div>

      <section class="mw-strip">
        __STATUS_STRIP__
      </section>

      <section class="mw-layout">
        <div class="mw-panel">
          __MAIN_COLUMN__
        </div>
        <div class="mw-panel mw-panel-dark">
          __SIDE_COLUMN__
        </div>
      </section>

      <div class="mw-action-row">
        __FOOTER_ACTIONS__
      </div>
    </main>

    <aside class="mw-card mw-side">
      <div class="mw-heading-block">
        <p class="mw-screen-label">Design intent</p>
        <h2 class="mw-section-title">__SIDEBAR_TITLE__</h2>
        <p class="mw-copy">__SIDEBAR_COPY__</p>
      </div>

      <ul class="mw-list">
        __SIDEBAR_LIST__
      </ul>

      __SIDEBAR_FOOTER__
    </aside>
  </div>
</div>
