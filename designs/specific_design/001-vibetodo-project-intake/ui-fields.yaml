screens:
  - screen_id: SCR-001
    screen_name: Intake Start - Draft Editor
    shared_screen_ref: SCR-001
    fields:
      - field_id: FLD-001
        field_name: planning_mode
        label: Planning mode
        type: segmented_control
        area: header
        io: input
        required: true
        validation:
          - one of `project` or `daily_work`
        default_value: project
        source: user selection
        api_mapping: project.planning_mode
        data_mapping: Project.planning_mode
        navigation_rule_refs:
          - none
        notes: Switches the minimum template set without changing the shared `SCR-001` ownership.
      - field_id: FLD-002
        field_name: project_id
        label: Draft ID
        type: text
        area: header
        io: input
        required: false
        validation:
          - when present, must resolve to an existing local draft for resume
        default_value: null
        source: resume action or generated by system
        api_mapping: projectId
        data_mapping: Project.project_id
        navigation_rule_refs:
          - none
        notes: Used to reopen and resave the same intake draft without authentication.
      - field_id: FLD-003
        field_name: title
        label: Title
        type: text
        area: main
        io: input
        required: true
        validation:
          - non-empty after trim
        default_value: null
        source: user input
        api_mapping: structuredInput.title
        data_mapping: confirmed_intake_snapshot.structured_input.title
        navigation_rule_refs:
          - none
        notes: Shared required field for both planning modes.
      - field_id: FLD-004
        field_name: objective
        label: Objective
        type: textarea
        area: main
        io: input
        required: true
        validation:
          - non-empty after trim
        default_value: null
        source: user input
        api_mapping: structuredInput.objective
        data_mapping: confirmed_intake_snapshot.structured_input.objective
        navigation_rule_refs:
          - none
        notes: Feeds the first `objective_and_outcome` artifact in DOM-002.
      - field_id: FLD-005
        field_name: background_or_current_situation
        label: Background or current situation
        type: textarea
        area: main
        io: input
        required: true
        validation:
          - non-empty after trim
        default_value: null
        source: user input
        api_mapping: structuredInput.background_or_current_situation
        data_mapping: confirmed_intake_snapshot.structured_input.background_or_current_situation
        navigation_rule_refs:
          - none
        notes: Shared required field for both planning modes.
      - field_id: FLD-006
        field_name: scope_summary
        label: Scope summary
        type: textarea
        area: main
        io: input
        required: true
        validation:
          - required when `planning_mode=project`
        default_value: null
        source: user input
        api_mapping: structuredInput.scope_summary
        data_mapping: confirmed_intake_snapshot.structured_input.scope_summary
        navigation_rule_refs:
          - none
        notes: Hidden for `daily_work`; replaces deliverable-specific input in that mode.
      - field_id: FLD-007
        field_name: stakeholders
        label: Stakeholders
        type: textarea
        area: main
        io: input
        required: true
        validation:
          - required when `planning_mode=project`
        default_value: null
        source: user input
        api_mapping: structuredInput.stakeholders
        data_mapping: confirmed_intake_snapshot.structured_input.stakeholders
        navigation_rule_refs:
          - none
        notes: Accepts people, teams, or affected parties without software-only terminology.
      - field_id: FLD-008
        field_name: expected_outcome_or_deliverable
        label: Expected outcome or deliverable
        type: textarea
        area: main
        io: input
        required: true
        validation:
          - required when `planning_mode=daily_work`
        default_value: null
        source: user input
        api_mapping: structuredInput.expected_outcome_or_deliverable
        data_mapping: confirmed_intake_snapshot.structured_input.expected_outcome_or_deliverable
        navigation_rule_refs:
          - none
        notes: Replaces `scope_summary` and `stakeholders` as the mode-specific required field.
      - field_id: FLD-009
        field_name: constraints_or_conditions
        label: Constraints or conditions
        type: textarea
        area: main
        io: input
        required: true
        validation:
          - non-empty after trim
        default_value: null
        source: user input
        api_mapping: structuredInput.constraints_or_conditions
        data_mapping: confirmed_intake_snapshot.structured_input.constraints_or_conditions
        navigation_rule_refs:
          - none
        notes: Preserves non-software constraints such as policy, staffing, or timing.
      - field_id: FLD-010
        field_name: free_form_context
        label: Free-form context
        type: textarea
        area: main
        io: input
        required: true
        validation:
          - must preserve line breaks and long-form nuance on every draft save
        default_value: null
        source: user input
        api_mapping: freeFormInput.body
        data_mapping: confirmed_intake_snapshot.free_form_input.body
        navigation_rule_refs:
          - none
        notes: Stored alongside structured input and shown again in the review step without truncation.
      - field_id: FLD-011
        field_name: save_draft_action
        label: Save draft
        type: action
        area: footer
        io: input
        required: false
        validation:
          - disabled until minimum shared required fields are present
        default_value: null
        source: user action
        api_mapping: generationTrigger=draft_save
        data_mapping: Project.lifecycle_status
        navigation_rule_refs:
          - none
        notes: Persists or updates the draft while keeping `lifecycle_status=draft_intake`.
      - field_id: FLD-012
        field_name: review_step_action
        label: Review before refinement
        type: action
        area: footer
        io: input
        required: false
        validation:
          - enabled only when mode-specific required fields and free-form context are present
        default_value: null
        source: user action
        api_mapping: none
        data_mapping: none
        navigation_rule_refs:
          - none
        notes: Switches the screen into the review state without leaving `SCR-001`.
  - screen_id: SCR-001-REVIEW
    screen_name: Intake Start - Pre-Start Review
    shared_screen_ref: SCR-001
    fields:
      - field_id: FLD-013
        field_name: review_structured_summary
        label: Structured input summary
        type: summary_panel
        area: main
        io: output
        required: true
        validation:
          - show every mode-relevant field as entered by the user
        default_value: null
        source: current draft state
        api_mapping: project.workspaceContextIncludes=intake_structured_summary
        data_mapping: confirmed_intake_snapshot.structured_input
        navigation_rule_refs:
          - none
        notes: Mirrors the final values that will seed the first refinement artifact.
      - field_id: FLD-014
        field_name: review_free_form_summary
        label: Free-form context summary
        type: summary_panel
        area: main
        io: output
        required: true
        validation:
          - must show the full narrative or an expanded region with no silent truncation
        default_value: null
        source: current draft state
        api_mapping: project.workspaceContextIncludes=intake_free_form_context
        data_mapping: confirmed_intake_snapshot.free_form_input.body
        navigation_rule_refs:
          - none
        notes: Must remain editable from the same state before confirmation.
      - field_id: FLD-015
        field_name: edit_before_start_action
        label: Edit before start
        type: action
        area: sidebar
        io: input
        required: false
        validation:
          - returns to draft editor while preserving unsent changes
        default_value: null
        source: user action
        api_mapping: none
        data_mapping: none
        navigation_rule_refs:
          - none
        notes: Keeps review and edit inside `SCR-001` as required by the brief.
      - field_id: FLD-016
        field_name: confirm_and_start_action
        label: Confirm and start refinement
        type: action
        area: sidebar
        io: input
        required: true
        validation:
          - requires all mode-specific fields plus free-form context to be present
        default_value: null
        source: user action
        api_mapping: POST /api/projects
        data_mapping: RefinementSession.active_artifact_key
        navigation_rule_refs:
          - none
        notes: Stores `project_id`, `title`, `planning_mode`, confirmed structured input, confirmed free-form input, and `confirmed_at`, then transitions to `SCR-002`.
